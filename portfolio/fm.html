<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Recent Work</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="fm.css" />
  </head>
  <body>
    <section class="work" aria-labelledby="work-heading">
      <h2 id="work-heading" class="work__title">My Recent Work</h2>
      <div class="cards">
      <article class="card card--stack-0">
        <div class="card__media">
          <img
            class="card__image"
            src="assets/rivanta 1.png"
            alt="Rivanta — From AI-powered automation to conversion-focused web experiences"
          />
        </div>
      </article>
      <article class="card card--stack-1">
        <div class="card__media">
          <img
            class="card__image"
            src="assets/beatstore 1.png"
            alt="BeatStore.in — India's dedicated beat marketplace for producers and artists"
          />
        </div>
      </article>
      <article class="card card--stack-2">
        <div class="card__media">
          <img
            class="card__image"
            src="assets/fm 1.png"
            alt="Feedlot Manager — Software that works as hard as you do"
          />
        </div>
      </article>
      <div class="cards__runway" aria-hidden="true"></div>
      </div>
    </section>
  </body>
</html>
